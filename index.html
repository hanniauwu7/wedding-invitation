<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Invita-Ya | Tu Invitación Digital</title>

  <!-- Preconnect para reducir latencia de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload hero image para el LCP de la invitación principal -->
  <link rel="preload" as="image" href="/invitations/kassandra-brian/img/Portada.jpeg" />

  <!--
    Todas las fuentes consolidadas en una sola request:
    - Dancing Script, Great Vibes, Montserrat → invitaciones y landing
    - Google Sans, Roboto → Admin Panel y RSVP Dashboard (cargadas aquí
      para evitar el @import en runtime dentro de CSS-in-JS)
    display=swap evita FOIT (flash of invisible text)
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet"
  >
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
